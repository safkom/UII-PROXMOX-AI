version: "3.8"

services:
  ai-stack:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-stack
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ..:/app
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
